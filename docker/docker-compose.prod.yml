services:
  # --- Database: PostgreSQL with pgvector ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: scholarsight-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scholarsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-scholarsight}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./scripts/init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scholarsight}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - scholarsight-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # --- Cache / Broker: Redis ---
  redis:
    image: redis:7-alpine
    container_name: scholarsight-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - scholarsight-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # --- Object Storage: MinIO ---
  minio:
    image: minio/minio:latest
    container_name: scholarsight-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata_prod:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - scholarsight-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # --- Reverse Proxy: Nginx ---
  nginx:
    image: nginx:alpine
    container_name: scholarsight-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - scholarsight-net

  # --- Backend API: FastAPI ---
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: scholarsight-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-scholarsight}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-scholarsight}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-scholarsight}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-scholarsight}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - EMBEDDING_SERVICE_URL=http://embedding:80
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - DEBUG=false
    ports:
      - "8081:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8081 --workers 4
    restart: unless-stopped
    networks:
      - scholarsight-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # --- Celery Worker ---
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: scholarsight-celery-worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-scholarsight}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-scholarsight}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-scholarsight}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-scholarsight}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - EMBEDDING_SERVICE_URL=http://embedding:80
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - postgres
      - redis
      - minio
    command: celery -A app.tasks.celery_app worker -l info -Q ocr_extraction,summarization,embedding_generation --concurrency=2
    restart: unless-stopped
    networks:
      - scholarsight-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

volumes:
  pgdata_prod:
  redisdata_prod:
  miniodata_prod:
  certbot_www:
  certbot_certs:
  embedding_cache:

networks:
  scholarsight-net:
    driver: bridge