services:
  # --- Database: PostgreSQL with pgvector ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: scholarsight-postgres
    environment:
      POSTGRES_USER: scholarsight
      POSTGRES_PASSWORD: scholarsight_dev
      POSTGRES_DB: scholarsight
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../scripts/init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholarsight"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - scholarsight-net

  # --- Cache / Broker: Redis ---
  redis:
    image: redis:7-alpine
    container_name: scholarsight-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - scholarsight-net

  # --- Object Storage: MinIO ---
  minio:
    image: minio/minio:latest
    container_name: scholarsight-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - scholarsight-net

  # --- Embedding Service: BGE-M3 via TEI ---
  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: scholarsight-embedding
    environment:
      MODEL_ID: BAAI/bge-m3
    ports:
      - "8080:80"
    volumes:
      - embedding_cache:/data
    command: --model-id BAAI/bge-m3
    networks:
      - scholarsight-net

  # --- Reverse Proxy: Nginx ---
  nginx:
    image: nginx:alpine
    container_name: scholarsight-nginx
    ports:
      - "8086:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - scholarsight-net

  # --- Backend API: FastAPI ---
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: scholarsight-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://scholarsight:scholarsight_dev@postgres:5432/scholarsight
      - DATABASE_URL_SYNC=postgresql://scholarsight:scholarsight_dev@postgres:5432/scholarsight
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - EMBEDDING_SERVICE_URL=http://embedding:80
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-in-production}
      - ENVIRONMENT=development
    ports:
      - "8081:8000"
    volumes:
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8081 --reload
    networks:
      - scholarsight-net

  # --- Celery Worker ---
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: scholarsight-celery-worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://scholarsight:scholarsight_dev@postgres:5432/scholarsight
      - DATABASE_URL_SYNC=postgresql://scholarsight:scholarsight_dev@postgres:5432/scholarsight
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - EMBEDDING_SERVICE_URL=http://embedding:80
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ENVIRONMENT=development
    volumes:
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker -l info -Q ocr_extraction,summarization,embedding_generation
    networks:
      - scholarsight-net

volumes:
  pgdata:
  redisdata:
  miniodata:
  embedding_cache:

networks:
  scholarsight-net:
    driver: bridge